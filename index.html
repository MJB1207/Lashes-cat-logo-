<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Salón de Belleza</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            blush: '#FFF0F5', charcoal: '#1A1A1A', fuchsia: '#D6336C', sand: '#F3E5F5', drift: '#6B7280', admin: '#111827', adminCard: '#1F2937'
          },
          fontFamily: { display: ['Playfair Display', 'serif'], body: ['Lato', 'sans-serif'] }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --bg: #FFF0F5; --fg: #1A1A1A; --accent: #D6336C; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--fg); overflow-x: hidden; max-width: 100vw; }
    .font-display { font-family: 'Playfair Display', serif; }
    .service-card { transition: transform 0.2s; border-radius: 16px; overflow: hidden; background: #fff; }
    .service-card:active { transform: scale(0.97); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,240,245,0.97); backdrop-filter: blur(12px); border-top: 1px solid #f3e5f5; z-index: 900; padding-bottom: env(safe-area-inset-bottom, 0px); display: flex; }
    .bottom-nav button { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; color: #6B7280; transition: color 0.2s; padding: 10px 0; background: none; border: none; cursor: pointer; flex: 1; }
    .bottom-nav button.active { color: #D6336C; font-weight: 700; }
    .bottom-nav button i { font-size: 20px; }
    .modal-overlay { position: fixed; inset: 0; z-index: 1100; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }
    .modal-box { transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); width: 100%; max-height: 95vh; overflow-y: auto; border-radius: 24px 24px 0 0; background: #fff; }
    .modal-overlay.visible .modal-box { transform: translateY(0); }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-120%); background: #1A1A1A; color: #fff; padding: 12px 24px; border-radius: 50px; font-size: 14px; z-index: 2000; transition: transform 0.4s; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .admin-input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1.5px solid #374151; font-size: 15px; font-family: 'Lato', sans-serif; background: #1F2937; color: #f9fafb; }
    .admin-input:focus { outline: none; border-color: #D6336C; }
    .badge { position: absolute; top: -5px; right: -5px; background: #D6336C; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .tabs-scroll { overflow-x: auto; scrollbar-width: none; } .tabs-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  <nav class="bottom-nav">
    <button class="active" onclick="switchScreen('home')" id="navHome"><i class="fas fa-spa"></i><span>Inicio</span></button>
    <button onclick="switchScreen('booking')" id="navBooking" class="relative"><i class="fas fa-calendar-check"></i><span id="bookingBadge" class="badge hidden">0</span><span>Turno</span></button>
    <button onclick="handleAdminClick()" id="navAdmin"><i class="fas fa-lock"></i><span>Admin</span></button>
  </nav>

  <main id="screenHome" class="pb-24">
    <div class="relative h-72 overflow-hidden bg-charcoal">
      <img id="heroImg" src="" alt="Salón" class="w-full h-full object-cover opacity-70">
      <div class="absolute inset-0 flex flex-col justify-end p-6 bg-gradient-to-t from-black/70">
        <h1 id="salonTitle" class="font-display text-3xl font-900 text-white leading-tight"></h1>
        <div class="flex items-center gap-2 text-white/90 text-sm mt-2"><i class="fas fa-map-marker-alt"></i><span id="salonAddress"></span></div>
      </div>
    </div>
    <section class="px-4 py-6">
      <h2 class="font-display text-2xl font-bold mb-4">Nuestros Servicios</h2>
      <div id="servicesGrid" class="grid grid-cols-2 gap-3"></div>
    </section>
  </main>

  <div id="screenBooking" class="pb-24 px-4 pt-6" style="display:none;">
    <h2 class="font-display text-2xl font-bold mb-4">Reservar Turno</h2>
    <div id="bookingEmpty" class="text-center py-12"><i class="fas fa-calendar-xmark text-4xl text-sand mb-3"></i><p class="text-drift text-sm">No has seleccionado servicios</p></div>
    <div id="bookingList" class="space-y-3 mb-6" style="display:none;"></div>
    <div id="bookingForm" class="space-y-3 border-t border-sand pt-4" style="display:none;">
      <div id="bookingTotal" class="text-right font-bold text-xl mb-2"></div>
      <input type="text" id="bookName" placeholder="Tu nombre completo" class="admin-input border-sand bg-white text-charcoal">
      <input type="tel" id="bookPhone" placeholder="Tu teléfono" class="admin-input border-sand bg-white text-charcoal">
      <input type="text" id="bookMunicipality" placeholder="Municipio / Dirección" class="admin-input border-sand bg-white text-charcoal">
      <select id="bookTime" class="admin-input border-sand bg-white text-charcoal"><option value="">Selecciona el horario</option></select>
      <button onclick="sendBooking()" class="w-full py-3 rounded-xl font-bold text-white text-base bg-green-600 active:scale-95 transition flex items-center justify-center gap-2"><i class="fab fa-whatsapp text-xl"></i> Reservar por WhatsApp</button>
    </div>
  </div>

  <!-- LOGIN SEGURO (Token en la memoria, no en el código) -->
  <div id="loginModal" class="modal-overlay"><div class="modal-box p-8 shadow-2xl"><h3 class="font-display text-xl font-bold mb-4 text-center">Acceso Admin</h3><div class="space-y-4"><p class="text-sm text-drift text-center">Pega tu Token de GitHub. Se guardará en tu celular de forma segura.</p><input id="loginToken" type="password" class="admin-input border-sand bg-white text-charcoal" placeholder="ghp_..."><p id="loginError" class="text-red-500 text-sm hidden">Token incorrecto.</p><button type="button" onclick="handleLogin()" class="w-full py-3 rounded-xl font-bold text-white active:scale-95 transition" style="background:var(--accent)">Entrar</button><button type="button" onclick="closeAllModals()" class="w-full py-3 rounded-xl font-bold text-drift border border-sand">Cancelar</button></div></div></div>

  <div id="adminModal" class="modal-overlay"><div class="modal-box bg-admin text-white flex flex-col shadow-2xl" style="height:100vh;max-height:100vh;border-radius:0;">
    <header class="p-4 border-b border-gray-700 flex justify-between items-center shrink-0"><h2 class="font-display text-lg font-bold" style="color:var(--accent)">Admin Salón</h2><button onclick="closeAllModals()" class="text-xl"><i class="fas fa-times"></i></button></header>
    <div class="flex gap-1 p-3 border-b border-gray-700 shrink-0 bg-adminCard/50 overflow-x-auto tabs-scroll">
      <button onclick="showAdminPage('info')" class="admin-tab px-3 py-2 rounded-lg text-xs font-bold text-gray-300 shrink-0" data-page="info"><i class="fas fa-store mr-1"></i> Info</button>
      <button onclick="showAdminPage('services')" class="admin-tab px-3 py-2 rounded-lg text-xs font-bold text-gray-300 shrink-0" data-page="services"><i class="fas fa-wand-magic-sparkles mr-1"></i> Servicios</button>
    </div>
    <div id="adminContent" class="flex-1 overflow-y-auto p-5"></div>
    <footer class="p-3 border-t border-gray-700 shrink-0"><button onclick="handleLogout()" class="w-full flex items-center justify-center gap-2 py-3 rounded-xl hover:bg-red-900/30 text-red-400 font-bold"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button></footer>
  </div></div>

  <div id="toast" class="toast"></div>

  <script>
    // CONFIGURACIÓN DE TU REPOSITORIO (IGUAL QUE ECOS DE MODA)
    const GITHUB_OWNER = 'ecosdemoda'; 
    const GITHUB_REPO = 'Lashes-cat-logo-';
    const GITHUB_BRANCH = 'main';
    const GITHUB_FILE_PATH = 'data.json';
    const RAW_URL = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${GITHUB_FILE_PATH}`;
    const API_URL = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE_PATH}`;

    let storeData = {}, isLoggedIn = false, bookingCart = [], fileSha = '';

    // 1. CARGAR DATOS (DESDE GITHUB RAW - SIN VPN PARA CLIENTAS EN CUBA)
    async function initApp() {
      try {
        const response = await fetch(RAW_URL + '?t=' + Date.now()); // Cache bypass
        if (response.ok) storeData = await response.json();
      } catch(e) { console.error(e); }
      if (!storeData.services) storeData.services = [];
      renderHome(); generateTimeSlots();
    }
    
    // 2. GUARDAR DATOS (DESDE ADMIN CON TOKEN - REQUIERE VPN PARA GUARDAR)
    async function saveData() { 
      try {
        const token = localStorage.getItem('gh_token_lashes'); if(!token) throw new Error("No Token");
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(storeData, null, 2))));
        const currentFileRes = await fetch(API_URL, { headers: { Authorization: `token ${token}` } });
        if (currentRes.status === 401) { showToast('Token incorrecto o sin permisos', 'error'); throw new Error("Bad Token"); }
        if (currentRes.status === 404) { showToast('Falta crear data.json en GitHub', 'error'); throw new Error("No file"); }
        if(!currentFileRes.ok) throw new Error("Error SHA");
        fileSha = (await currentFileRes.json()).sha;
        const putRes = await fetch(API_URL, {
          method: 'PUT', headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: 'Actualizar salón', content, sha: fileSha, branch: GITHUB_BRANCH })
        });
        if(!putRes.ok) throw new Error("Error al guardar en GitHub");
        fileSha = (await putRes.json()).content.sha;
        showToast('¡Guardado en GitHub!', 'success');
      } catch(e) { showToast('Error al guardar. ¿VPN encendida?', 'error'); throw e; } 
    }

    // 3. AUTENTICACIÓN
    function initAuth() { isLoggedIn = !!localStorage.getItem('gh_token_lashes'); document.getElementById('navAdmin').querySelector('i').className = isLoggedIn ? 'fas fa-unlock' : 'fas fa-lock'; }
    async function handleLogin() { 
      const t = document.getElementById('loginToken').value.trim(); if(!t) return;
      try {
        const r = await fetch(API_URL, {headers: {Authorization: `token ${t}`}});
        if(r.ok){ localStorage.setItem('gh_token_lashes', t); isLoggedIn = true; fileSha=(await r.json()).sha; closeAllModals(); openAdmin(); initAuth(); }
        else document.getElementById('loginError').classList.remove('hidden');
      } catch(e) { document.getElementById('loginError').classList.remove('hidden'); }
    }
    function handleLogout() { localStorage.removeItem('gh_token_lashes'); isLoggedIn=false; initAuth(); closeAllModals(); }

    function renderHome() {
      document.getElementById('salonTitle').textContent = storeData.salonName || 'Salón';
      document.getElementById('salonAddress').textContent = storeData.address || '';
      document.getElementById('heroImg').src = storeData.heroImage || 'https://picsum.photos/seed/salon/800/600';
      const g = document.getElementById('servicesGrid'); g.innerHTML = '';
      storeData.services.forEach(s => {
        g.innerHTML += `<div class="service-card shadow-md border border-sand/50 flex flex-col"><img src="${s.image}" class="w-full h-36 object-cover"><div class="p-3 flex-grow flex flex-col"><h3 class="font-display text-sm font-bold leading-tight mb-1">${s.name}</h3><p class="text-xs text-drift mb-2"><i class="far fa-clock mr-1"></i>${s.duration || '60 min'}</p><p class="text-sm font-bold mt-auto" style="color:var(--accent)">$${s.price}</p></div><button onclick="addService(${s.id})" class="w-full py-2 text-white text-xs font-bold active:scale-95 transition" style="background:var(--accent)"><i class="fas fa-plus mr-1"></i>Agregar</button></div>`;
      });
    }

    function generateTimeSlots() { const sel = document.getElementById('bookTime'); for(let h=9;h<18;h++){const h12=h>12?h-12:h;const ap=h>=12?'PM':'AM';sel.innerHTML+=`<option value="${h}:00">${h12}:00 ${ap}</option>`;sel.innerHTML+=`<option value="${h}:30">${h12}:30 ${ap}</option>`;} }

    function addService(id) { const s = storeData.services.find(x => x.id === id); if(!s) return; const e = bookingCart.find(x => x.id === id); if(e) e.qty++; else bookingCart.push({id: s.id, name: s.name, price: s.price, qty: 1}); updateBookingBadge(); showToast('Servicio añadido', 'success'); }
    function removeService(id) { bookingCart = bookingCart.filter(x => x.id !== id); updateBookingBadge(); renderBooking(); }
    function updateBookingBadge() { const t = bookingCart.reduce((s,i)=>s+i.qty,0); const b = document.getElementById('bookingBadge'); if(t>0){b.textContent=t;b.classList.remove('hidden');}else b.classList.add('hidden'); }

    function renderBooking() {
      const list = document.getElementById('bookingList'), form = document.getElementById('bookingForm'), empty = document.getElementById('bookingEmpty');
      if(bookingCart.length===0){ list.style.display='none'; form.style.display='none'; empty.style.display='block'; return; }
      empty.style.display='none'; list.style.display='block'; form.style.display='block'; list.innerHTML=''; let total=0;
      bookingCart.forEach(i => { total+=i.price*i.qty; list.innerHTML += `<div class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm"><div><h4 class="font-bold text-sm">${i.name}</h4><p class="text-xs" style="color:var(--accent)">$${i.price} x ${i.qty}</p></div><div><button onclick="removeService(${i.id})" class="text-red-400"><i class="fas fa-trash text-xs"></i></button></div></div>`; });
      document.getElementById('bookingTotal').innerHTML = `<span class="text-drift text-sm">Total:</span> <span style="color:var(--accent)">$${total}</span>`;
    }

    function sendBooking() {
      const name = document.getElementById('bookName').value
